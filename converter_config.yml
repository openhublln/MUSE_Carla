# NuScenes Converter Configuration

version: 'v1.0-mini'

input:
  base_dir: 'data/_out'

output:
  base_dir: 'data/nuscenes_format'  # overridden at runtime by the GUI (data/nuscenes_<rate>Hz)
  keyframe_rate: 2.0                # Hz — must be <= collection frequency_hz

keyframe:
  min_points_per_object: 1  # minimum lidar points required for a valid annotation

# CARLA sensor name -> NuScenes channel name
sensor_mappings:
  camera:
    'Camera_Front':      'CAM_FRONT'
    'Camera_Back':       'CAM_BACK'
    'Camera_FrontRight': 'CAM_FRONT_RIGHT'
    'Camera_FrontLeft':  'CAM_FRONT_LEFT'
    'Camera_BackRight':  'CAM_BACK_RIGHT'
    'Camera_BackLeft':   'CAM_BACK_LEFT'
  radar:
    'Radar_Front':      'RADAR_FRONT'
    'Radar_FrontRight': 'RADAR_FRONT_RIGHT'
    'Radar_FrontLeft':  'RADAR_FRONT_LEFT'
    'Radar_BackRight':  'RADAR_BACK_RIGHT'
    'Radar_BackLeft':   'RADAR_BACK_LEFT'
  lidar:
    'Lidar': 'LIDAR_TOP'
  # semantic_lidar:
  #   'Semantic_Lidar': 'SEMANTIC_LIDAR'
  gnss:
    'GNSS': 'GNSS'
  imu:
    'IMU': 'IMU'

# Category passthrough: _3dbbox.json label -> NuScenes category name
category_mappings:
  'vehicle.car':                 'vehicle.car'
  'vehicle.truck':               'vehicle.truck'
  'vehicle.emergency.police':    'vehicle.emergency.police'
  'vehicle.emergency.ambulance': 'vehicle.emergency.ambulance'
  'vehicle.bus.rigid':           'vehicle.bus.rigid'
  'human.pedestrian':            'human.pedestrian.adult'

attributes:
  vehicle:
    - name: 'vehicle.moving'
    - name: 'vehicle.parked'
    - name: 'vehicle.stopped'
  human:
    - name: 'pedestrian.moving'
    - name: 'pedestrian.standing'

performance:
  max_workers: 5
