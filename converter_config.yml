# NuScenes Converter Configuration

# Target NuScenes version
version: 'v1.0'

# Input/Output paths
input:
  base_dir: '_out'  # Base directory containing scene folders

output:
  base_dir: 'nuscenes_format'  # Output directory for NuScenes format data
  maintain_folder_structure: true  # Keep original scene folder structure
  keyframe_rate: 10.0  # Updated target keyframe rate to 10 Hz

# Keyframe settings
keyframe:
  rate: 2  # Hz (NuScenes standard is 2Hz)
  min_points_per_object: 1  # Minimum number of lidar points for valid annotation

# Coordinate system
coordinate_system:
  up_axis: 'z'  # CARLA uses Z-up coordinate system
  forward_axis: 'x'  # CARLA uses X-forward coordinate system
  use_ego_vehicle_frame: false  # Whether to use ego vehicle as origin

# Sensor mappings (CARLA sensor -> NuScenes channel)
sensor_mappings:
  camera:
    'Camera_Front': 'CAM_FRONT'
    'Camera_Back': 'CAM_BACK'
    'Camera_FrontRight': 'CAM_FRONTRIGHT'
    'Camera_FrontLeft': 'CAM_FRONTLEFT' 
    'Camera_BackRight': 'CAM_BACKRIGHT'
    'Camera_BackLeft': 'CAM_BACKLEFT'
  radar:
    'Radar_Front': 'RADAR_FRONT'
    'Radar_Back': 'RADAR_BACK'
    'Radar_FrontRight': 'RADAR_FRONTRIGHT'
    'Radar_FrontLeft': 'RADAR_FRONTLEFT'
    'Radar_BackRight': 'RADAR_BACKRIGHT'
    'Radar_BackLeft': 'RADAR_BACKLEFT'
  lidar:
    'Lidar': 'LIDAR'
  semantic_lidar:
    'Semantic_Lidar': 'SEMANTIC_LIDAR'
  gnss:
    'GNSS': 'GNSS'
  imu:
    'IMU': 'IMU'

# Category mappings (CARLA type -> NuScenes category)
category_mappings:
  'vehicle': 'vehicle.car'
  # Add more mappings. NuScenes categories : 
  # animal	
  # human.pedestrian.adult	
  # human.pedestrian.child	
  # human.pedestrian.construction_worker	
  # human.pedestrian.personal_mobility	
  # human.pedestrian.police_officer	
  # human.pedestrian.stroller	
  # human.pedestrian.wheelchair	
  # movable_object.barrier	
  # movable_object.debris	
  # movable_object.pushable_pullable	
  # movable_object.trafficcone	
  # static_object.bicycle_rack	
  # vehicle.bicycle	
  # vehicle.bus.bendy	
  # vehicle.bus.rigid	
  # vehicle.car	
  # vehicle.construction	
  # vehicle.emergency.ambulance	
  # vehicle.emergency.police	
  # vehicle.motorcycle	
  # vehicle.trailer	
  # vehicle.truck
  

# Attribute definitions
attributes:
  vehicle:
    - name: 'vehicle.moving'
    - name: 'vehicle.parked'
    - name: 'vehicle.stopped'
  human:
    - name: 'pedestrian.moving'
    - name: 'pedestrian.standing'
    - name: 'pedestrian.sitting_lying_down'